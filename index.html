<!DOCTYPE html>
<html lang="ja">
<head>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;background:#0d0d0d;color:#f0ede6;font-family:'Noto Sans JP','Helvetica Neue',sans-serif;overscroll-behavior:none;}
input,select,button{font-family:inherit;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:#111;}
::-webkit-scrollbar-thumb{background:#333;border-radius:2px;}
#app{min-height:100vh;}
.topbar{background:#111;border-bottom:1px solid #1e1e1e;padding:0 14px;display:flex;align-items:center;gap:8px;height:52px;position:sticky;top:0;z-index:100;}
.nav{background:#111;border-bottom:1px solid #1a1a1a;display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.nav::-webkit-scrollbar{display:none;}
.nav button{background:none;border:none;color:#484848;font-size:12px;padding:10px 12px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;font-family:inherit;}
.nav button.active{color:#E84545;border-bottom-color:#E84545;font-weight:700;}
.datestrip{padding:9px 14px;display:flex;gap:5px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.datestrip::-webkit-scrollbar{display:none;}
.content{padding:0 14px 80px;}
.overlay-bg{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:200;padding:12px;}
.overlay-box{background:#1c1c1c;border:1px solid #2e2e2e;border-radius:12px;padding:22px;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;}
.stitle{font-weight:800;font-size:15px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #222;}
.fl{font-size:12px;color:#666;display:block;margin-bottom:4px;}
.tinput{width:100%;background:#111;border:1px solid #333;border-radius:6px;padding:8px 12px;color:#f0ede6;font-size:14px;outline:none;font-family:inherit;}
.tsel{width:100%;background:#111;border:1px solid #333;border-radius:6px;padding:8px 12px;color:#f0ede6;font-size:14px;font-family:inherit;}
.pbtn{padding:8px 16px;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600;border:none;font-family:inherit;}
.card{background:#161616;border:1px solid #202020;border-radius:10px;padding:11px 14px;cursor:pointer;margin-bottom:7px;}
.badge-plate{display:inline-block;background:#1a2a1a;border:1px solid #4caf5066;border-radius:4px;padding:1px 6px;font-size:11px;color:#4caf50;font-weight:700;letter-spacing:2px;}
.badge-visit{display:inline-block;background:#1a3040;border:1px solid #5ab4d666;border-radius:4px;padding:1px 7px;font-size:11px;color:#5ab4d6;font-weight:700;}
.av{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0;}
.suggest-box{position:absolute;top:100%;left:0;right:0;background:#1e1e1e;border:1px solid #333;border-radius:6px;z-index:50;max-height:140px;overflow-y:auto;}
.suggest-item{padding:7px 11px;cursor:pointer;font-size:13px;border-bottom:1px solid #252525;}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:36px;height:36px;border-radius:50%;border:3px solid #E84545;border-top-color:transparent;animation:spin 1s linear infinite;}
.sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;}
</style>
</head>
<body>
<div id="app">
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;">
    <div class="spinner"></div>
    <div style="color:#555;font-size:13px;">Firebaseに接続中…</div>
  </div>
</div>

<!-- Firebase SDK (CDN) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ── Firebase初期化 ──
const firebaseConfig = {
  apiKey: "AIzaSyAoxoIR-8AxfcZ2-AZkmapYRTH2PHBW7Po",
  authDomain: "tyrepro-fbd7a.firebaseapp.com",
  databaseURL: "https://tyrepro-fbd7a-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "tyrepro-fbd7a",
  storageBucket: "tyrepro-fbd7a.firebasestorage.app",
  messagingSenderId: "246108948394",
  appId: "1:246108948394:web:2005eaf5287e62259d8dd3"
};
const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);

// ── ヘルパー ──
const COLORS=["#E84545","#2B7A77","#F5A623","#7B2FBE","#1E88E5","#43A047","#E91E63","#FF7043"];
const TODAY=new Date();
function pad2(n){return String(n).padStart(2,"0");}
function toKey(d){return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate());}
function addDays(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r;}
function sameDay(a,b){return toKey(a)===toKey(b);}
function jpDay(d){return["日","月","火","水","木","金","土"][d.getDay()];}
function t2m(t){var p=t.split(":");return Number(p[0])*60+Number(p[1]);}
function m2t(m){return pad2(Math.floor(m/60))+":"+pad2(m%60);}
function fmtDate(key){var d=new Date(key);return(d.getMonth()+1)+"月"+d.getDate()+"日("+jpDay(d)+")";}
function mapsUrl(a){return"https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(a);}

var DAYS=[],SLOTS=[];
for(var _i=0;_i<60;_i++)DAYS.push(addDays(TODAY,_i));
for(var _m=9*60;_m<=18*60;_m+=30)SLOTS.push(m2t(_m));

// ── 初期データ ──
const DEF_STAFF=[
  {id:1,name:"田中 健",color:COLORS[0],avatar:"田",active:true},
  {id:2,name:"佐藤 誠",color:COLORS[1],avatar:"佐",active:true},
  {id:3,name:"山本 亮",color:COLORS[2],avatar:"山",active:true},
  {id:4,name:"鈴木 学",color:COLORS[3],avatar:"鈴",active:true}
];
const DEF_SVC=[
  {id:1,name:"タイヤ交換（4本）",dur:60,active:true},
  {id:2,name:"タイヤ交換（2本）",dur:45,active:true},
  {id:3,name:"タイヤローテーション",dur:30,active:true},
  {id:4,name:"バランス調整",dur:30,active:true},
  {id:5,name:"パンク修理",dur:30,active:true}
];
const DEF_CUST=[
  {id:1001,lastName:"鈴木",firstName:"一郎",cars:[{make:"トヨタ プリウス",plate4:"1234"}],phone:"090-1234-5678",memo:""},
  {id:1002,lastName:"山田",firstName:"花子",cars:[{make:"ホンダ フィット",plate4:"5678"}],phone:"",memo:""},
  {id:1003,lastName:"中村",firstName:"次郎",cars:[{make:"日産 リーフ",plate4:"9012"}],phone:"080-9999-0000",memo:""}
];
function makeDefShifts(){
  var s={};
  DAYS.forEach(function(d){
    var key=toKey(d);s[key]={};
    DEF_STAFF.forEach(function(st){
      var we=d.getDay()===0||d.getDay()===6;
      s[key][st.id]=(we&&st.id%2===0)?null:{start:"09:00",end:"18:00"};
    });
  });
  return s;
}
function makeDefRes(){
  return [
    {id:101,custId:1001,carIdx:0,sid:1,date:toKey(TODAY),time:"09:00",dur:60,stfIds:[1],status:"confirmed",memo:"",visit:false,address:""},
    {id:102,custId:1002,carIdx:0,sid:3,date:toKey(TODAY),time:"10:30",dur:30,stfIds:[2],status:"confirmed",memo:"",visit:false,address:""},
    {id:103,custId:1003,carIdx:0,sid:4,date:toKey(TODAY),time:"11:00",dur:30,stfIds:[3,4],status:"pending",memo:"2名対応",visit:false,address:""},
    {id:104,custId:1001,carIdx:0,sid:2,date:toKey(addDays(TODAY,1)),time:"14:00",dur:45,stfIds:[1,2],status:"confirmed",memo:"",visit:true,address:"東京都新宿区西新宿1-1-1"}
  ];
}

// ── アプリ状態 ──
var S={
  view:"timeline",selDate:toKey(TODAY),role:"manager",
  staff:DEF_STAFF,svcs:DEF_SVC,res:makeDefRes(),
  customers:DEF_CUST,shifts:makeDefShifts(),
  moff:0,custSearch:"",
  sfForm:{name:"",color:COLORS[0]},svForm:{name:"",dur:30},
  syncStatus:"ok" // ok | syncing | error
};

// ── Firebase 読み書き ──
// Firebase Realtime DBはオブジェクトのみ（配列不可）なのでobj変換
function arr2obj(arr){var o={};arr.forEach(function(x){o["id_"+x.id]=x;});return o;}
function obj2arr(obj){if(!obj)return[];return Object.values(obj);}
// シフトはネストが深いので特別処理
function shiftsToFb(shifts){
  // nullはFirebaseで削除されるので"OFF"文字列に変換
  var out={};
  Object.keys(shifts).forEach(function(date){
    out[date]={};
    Object.keys(shifts[date]).forEach(function(sid){
      out[date][sid]=shifts[date][sid]===null?"__OFF__":shifts[date][sid];
    });
  });
  return out;
}
function fbToShifts(fbObj){
  if(!fbObj)return makeDefShifts();
  var out={};
  Object.keys(fbObj).forEach(function(date){
    out[date]={};
    if(fbObj[date]){
      Object.keys(fbObj[date]).forEach(function(sid){
        out[date][sid]=fbObj[date][sid]==="__OFF__"?null:fbObj[date][sid];
      });
    }
  });
  return out;
}

var fbWriteTimer={};
function fbWrite(path,data){
  // デバウンス: 連続書き込みを500ms待ってまとめる
  clearTimeout(fbWriteTimer[path]);
  S.syncStatus="syncing";
  updateSyncUI();
  fbWriteTimer[path]=setTimeout(function(){
    set(ref(db,path),data).then(function(){
      S.syncStatus="ok";updateSyncUI();
    }).catch(function(e){
      console.error("FB write error",e);
      S.syncStatus="error";updateSyncUI();
    });
  },500);
}

function saveStaff(){fbWrite("staff",arr2obj(S.staff));}
function saveSvcs() {fbWrite("svcs", arr2obj(S.svcs));}
function saveCust() {fbWrite("customers",arr2obj(S.customers));}
function saveRes()  {fbWrite("reservations",arr2obj(S.res));}
function saveShifts(){fbWrite("shifts",shiftsToFb(S.shifts));}

function updateSyncUI(){
  var el=document.getElementById("sync-indicator");
  if(!el)return;
  var cfg={syncing:{color:"#ffa726",text:"同期中…"},ok:{color:"#4caf50",text:"✓ 同期済"},error:{color:"#E84545",text:"⚠ 未同期"}};
  var c=cfg[S.syncStatus]||cfg.ok;
  el.style.color=c.color;el.textContent=c.text;
}

// ── リアルタイムリスナー ──
function startListeners(){
  onValue(ref(db,"staff"),function(snap){
    var d=snap.val();if(d){S.staff=obj2arr(d);render();}
  });
  onValue(ref(db,"svcs"),function(snap){
    var d=snap.val();if(d){S.svcs=obj2arr(d);render();}
  });
  onValue(ref(db,"customers"),function(snap){
    var d=snap.val();if(d){S.customers=obj2arr(d);render();}
  });
  onValue(ref(db,"reservations"),function(snap){
    var d=snap.val();if(d){S.res=obj2arr(d);render();}else{S.res=[];}
    render();
  });
  onValue(ref(db,"shifts"),function(snap){
    var d=snap.val();S.shifts=fbToShifts(d);render();
  });
}

// ── 初回：データがなければ初期データを書き込む ──
async function init(){
  try{
    var snap=await get(ref(db,"staff"));
    if(!snap.exists()){
      // 初回起動: 初期データをFirebaseに書き込む
      await set(ref(db,"staff"),arr2obj(DEF_STAFF));
      await set(ref(db,"svcs"),arr2obj(DEF_SVC));
      await set(ref(db,"customers"),arr2obj(DEF_CUST));
      await set(ref(db,"reservations"),arr2obj(makeDefRes()));
      await set(ref(db,"shifts"),shiftsToFb(makeDefShifts()));
    }
    startListeners();
  }catch(e){
    console.error("Firebase init error:",e);
    S.syncStatus="error";
    render();
  }
}
init();

// ── DOM生成ヘルパー ──
function el(tag,props,children){
  var e=document.createElement(tag);
  if(props)Object.keys(props).forEach(function(k){
    if(k==="style"&&typeof props[k]==="object"){Object.assign(e.style,props[k]);}
    else if(k.startsWith("on")){e.addEventListener(k.slice(2).toLowerCase(),props[k]);}
    else if(k==="className"){e.className=props[k];}
    else{e.setAttribute(k,props[k]);}
  });
  if(children)(Array.isArray(children)?children:[children]).forEach(function(c){
    if(c==null||c===false)return;
    e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c);
  });
  return e;
}
function div(style,children){return el("div",{style:style},children);}
function span(style,children){return el("span",{style:style},children);}
function btn(label,style,onClick){var b=el("button",{style:style,onClick:onClick});b.textContent=label;return b;}
function avEl(s,sz){
  sz=sz||28;
  var d=el("div",{className:"av"});
  d.style.cssText="width:"+sz+"px;height:"+sz+"px;background:"+s.color+";font-size:"+(sz*.4)+"px;";
  d.textContent=s.avatar;return d;
}
function plateBadge(p){if(!p)return null;var s=el("span",{className:"badge-plate"});s.textContent=p;return s;}
function visitBadge(){var s=el("span",{className:"badge-visit"});s.textContent="🚗 出張";return s;}
function pBtn(label,vari,onClick,extra){
  var styles={primary:{background:"#E84545",color:"#fff"},ghost:{background:"transparent",color:"#888",border:"1px solid #333"},danger:{background:"transparent",color:"#E84545",border:"1px solid #E84545"}};
  var b=el("button",{className:"pbtn",onClick:onClick,style:Object.assign({},styles[vari]||styles.ghost,extra||{})});
  b.textContent=label;return b;
}
function tInput(value,onInput,placeholder,extraStyle){
  var i=el("input",{className:"tinput",placeholder:placeholder||""});
  i.value=value;i.addEventListener("input",function(e){onInput(e.target.value);});
  if(extraStyle)Object.assign(i.style,extraStyle);return i;
}
function tSel(value,onChange,options){
  var s=el("select",{className:"tsel"});
  options.forEach(function(o){
    var op=document.createElement("option");
    op.value=o.value;op.textContent=o.label;
    if(String(o.value)===String(value))op.selected=true;
    s.appendChild(op);
  });
  s.addEventListener("change",function(e){onChange(e.target.value);});return s;
}
function labelWrap(labelText,content){
  var w=div({});var l=el("label",{className:"fl"});l.textContent=labelText;w.appendChild(l);w.appendChild(content);return w;
}

// ── モーダル ──
function openOverlay(contentFn){
  var bg=div({position:"fixed",inset:0,background:"rgba(0,0,0,.88)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:"12px"});
  var box=div({background:"#1c1c1c",border:"1px solid #2e2e2e",borderRadius:"12px",padding:"22px",width:"100%",maxWidth:"540px",maxHeight:"92vh",overflowY:"auto"});
  bg.addEventListener("click",function(){bg.remove();});
  box.addEventListener("click",function(e){e.stopPropagation();});
  contentFn(box,function(){bg.remove();});
  bg.appendChild(box);
  document.getElementById("app").appendChild(bg);
}
function stitle(box,t){var d=div({fontWeight:800,fontSize:"15px",marginBottom:"14px",paddingBottom:"10px",borderBottom:"1px solid #222"});d.textContent=t;box.appendChild(d);}

// ── ヘルパー参照 ──
function getStaff(id){return S.staff.find(function(s){return s.id==id;});}
function getSvc(id){return S.svcs.find(function(s){return s.id==id;});}
function getCust(id){return S.customers.find(function(c){return c.id==id;});}
function activeStaff(){return S.staff.filter(function(s){return s.active;});}
function activeSvcs(){return S.svcs.filter(function(s){return s.active;});}
function todayRes(){return S.res.filter(function(r){return r.date===S.selDate;});}
function custHistory(cid){return S.res.filter(function(r){return r.custId==cid;}).slice().sort(function(a,b){return b.date.localeCompare(a.date);});}
function monthDays(){
  var b=new Date(TODAY.getFullYear(),TODAY.getMonth()+S.moff,1);
  var y=b.getFullYear(),mo=b.getMonth(),len=new Date(y,mo+1,0).getDate(),arr=[];
  for(var i=0;i<len;i++)arr.push(new Date(y,mo,i+1));return arr;
}

// ── 予約モーダル ──
function openResModal(rf,isNew){
  openOverlay(function(box,close){
    function rebuild(){box.innerHTML="";buildResModal(box,close,rf,isNew,function(newRf){rf=newRf;rebuild();});}
    rebuild();
  });
}
function buildResModal(box,close,rf,isNew,onRfChange){
  stitle(box,isNew?"新規予約":"予約を編集");
  var form=div({display:"flex",flexDirection:"column",gap:"11px"});
  // 出張トグル
  var vBtn=el("button",{className:"pbtn",onClick:function(){onRfChange(Object.assign({},rf,{visit:!rf.visit}));}});
  Object.assign(vBtn.style,rf.visit?{background:"#1a3040",color:"#5ab4d6",border:"1px solid #5ab4d666"}:{background:"#1a1a1a",color:"#555",border:"1px solid #2a2a2a"});
  vBtn.textContent=rf.visit?"🚗 出張対応":"🏪 店舗対応";form.appendChild(vBtn);
  // 住所
  if(rf.visit){
    var addrW=div({});var addrL=el("label",{className:"fl"});addrL.textContent="訪問先住所";addrW.appendChild(addrL);
    var addrI=tInput(rf.address,function(v){rf.address=v;},"例：東京都新宿区西新宿1-1-1");addrW.appendChild(addrI);
    if(rf.address){var mapA=el("a",{href:mapsUrl(rf.address),target:"_blank",rel:"noopener noreferrer"});Object.assign(mapA.style,{display:"inline-block",marginTop:"5px",fontSize:"11px",color:"#5ab4d6",textDecoration:"none",background:"#1a3040",border:"1px solid #5ab4d644",borderRadius:"8px",padding:"3px 10px"});mapA.textContent="🗺 地図で確認";addrW.appendChild(mapA);}
    form.appendChild(addrW);
  }
  // 顧客検索
  var custW=div({});var lnW=div({position:"relative"});
  var g2=div({display:"grid",gridTemplateColumns:"1fr 1fr",gap:"7px"});
  var sugBox=div({position:"absolute",top:"100%",left:0,right:0,background:"#1e1e1e",border:"1px solid #333",borderRadius:"6px",zIndex:50,maxHeight:"140px",overflowY:"auto"});
  var fnI=tInput(rf.firstName,function(v){rf.firstName=v;},"名前");
  var statusDiv=div({fontSize:"11px",marginTop:"3px"});
  var lnI=tInput(rf.lastName,function(v){
    rf.lastName=v;rf.custId=null;rf.firstName="";rf.carIdx=0;
    sugBox.innerHTML="";statusDiv.textContent="";
    var suggs=S.customers.filter(function(c){return v&&c.lastName.startsWith(v);});
    suggs.forEach(function(c){
      var it=div({padding:"7px 11px",cursor:"pointer",fontSize:"13px",borderBottom:"1px solid #252525"});
      it.textContent=c.lastName+" "+c.firstName+(c.cars[0]&&c.cars[0].plate4?" ["+c.cars[0].plate4+"]":"");
      it.addEventListener("click",function(){
        rf.custId=c.id;rf.lastName=c.lastName;rf.firstName=c.firstName;rf.carIdx=0;
        lnI.value=c.lastName;fnI.value=c.firstName;sugBox.innerHTML="";
        statusDiv.textContent="✓ 既存顧客";statusDiv.style.color="#4caf50";
      });sugBox.appendChild(it);
    });
    statusDiv.textContent=rf.custId?"✓ 既存顧客":v?"新規顧客として登録":"";
    statusDiv.style.color=rf.custId?"#4caf50":"#ffa726";
  },"名字");
  lnW.appendChild(lnI);lnW.appendChild(sugBox);g2.appendChild(lnW);g2.appendChild(fnI);
  if(rf.custId){statusDiv.textContent="✓ 既存顧客";statusDiv.style.color="#4caf50";}
  var cL=el("label",{className:"fl"});cL.textContent="お客様（名字で検索）";
  custW.appendChild(cL);custW.appendChild(g2);custW.appendChild(statusDiv);form.appendChild(custW);
  // 車両
  var c=rf.custId?getCust(rf.custId):null;
  if(c&&c.cars&&c.cars.length>0){
    form.appendChild(labelWrap("車両",tSel(rf.carIdx,function(v){rf.carIdx=Number(v);},c.cars.map(function(car,i){return{value:i,label:car.make+(car.plate4?" ["+car.plate4+"]":"")}; }))));
  } else if(!rf.custId){
    var carg=div({display:"grid",gridTemplateColumns:"1fr 88px",gap:"7px"});
    carg.appendChild(labelWrap("車種",tInput(rf.newCarMake,function(v){rf.newCarMake=v;},"例：トヨタ プリウス")));
    var p4i=tInput(rf.newCarPlate4,function(v){rf.newCarPlate4=v.replace(/\D/g,"").slice(0,4);},"1234");
    Object.assign(p4i.style,{textAlign:"center",letterSpacing:"3px",fontWeight:"700"});p4i.maxLength=4;
    carg.appendChild(labelWrap("車番号4桁",p4i));form.appendChild(carg);
  }
  // 作業
  form.appendChild(labelWrap("作業内容",tSel(rf.sid,function(v){var sv=getSvc(Number(v));rf.sid=Number(v);if(sv)rf.dur=sv.dur;},activeSvcs().map(function(s){return{value:s.id,label:s.name+"（"+s.dur+"分）"}; }))));
