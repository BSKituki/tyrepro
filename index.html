<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#111111">
<title>TYRE PRO</title>
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;font-family:'Noto Sans JP','Helvetica Neue',sans-serif;overscroll-behavior:none;transition:background .2s,color .2s;}
body.dark{background:#0d0d0d;color:#f0ede6;}
body.light{background:#f5f5f0;color:#1a1a1a;}
input,select,button{font-family:inherit;}
::-webkit-scrollbar{width:4px;height:4px;}
body.dark ::-webkit-scrollbar-track{background:#111;}
body.dark ::-webkit-scrollbar-thumb{background:#333;border-radius:2px;}
body.light ::-webkit-scrollbar-track{background:#e0e0d8;}
body.light ::-webkit-scrollbar-thumb{background:#aaa;border-radius:2px;}
#app{min-height:100vh;}

/* DARK テーマ変数 */
body.dark{--bg:#0d0d0d;--bg2:#111;--bg3:#161616;--bg4:#1a1a1a;--bg5:#1c1c1c;--border:#1e1e1e;--border2:#222;--border3:#2e2e2e;--text:#f0ede6;--text2:#aaa;--text3:#666;--text4:#444;--text5:#333;--input-bg:#111;--input-border:#333;--card-border:#202020;--sep:#1a1a1a;}
/* LIGHT テーマ変数 */
body.light{--bg:#f5f5f0;--bg2:#ffffff;--bg3:#f0f0ea;--bg4:#e8e8e2;--bg5:#ffffff;--border:#ddddd5;--border2:#d0d0c8;--border3:#cccccc;--text:#1a1a1a;--text2:#444;--text3:#777;--text4:#999;--text5:#bbb;--input-bg:#ffffff;--input-border:#ccc;--card-border:#ddddd5;--sep:#e0e0d8;}

.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 14px;display:flex;align-items:center;gap:8px;height:52px;position:sticky;top:0;z-index:100;}
.nav{background:var(--bg2);border-bottom:1px solid var(--sep);display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.nav::-webkit-scrollbar{display:none;}
.nav button{background:none;border:none;color:var(--text3);font-size:12px;padding:10px 11px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;font-family:inherit;}
.nav button.active{color:#E84545;border-bottom-color:#E84545;font-weight:700;}
.datestrip{padding:9px 14px;display:flex;gap:5px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.datestrip::-webkit-scrollbar{display:none;}
.content{padding:0 14px 80px;}
.overlay-bg{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:200;padding:12px;}
.overlay-box{background:var(--bg5);border:1px solid var(--border3);border-radius:12px;padding:22px;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;}
.stitle{font-weight:800;font-size:15px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border2);}
.fl{font-size:12px;color:var(--text3);display:block;margin-bottom:4px;}
.tinput{width:100%;background:var(--input-bg);border:1px solid var(--input-border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:14px;outline:none;font-family:inherit;}
.tsel{width:100%;background:var(--input-bg);border:1px solid var(--input-border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:14px;font-family:inherit;}
.pbtn{padding:8px 16px;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600;border:none;font-family:inherit;}
.card{background:var(--bg3);border:1px solid var(--card-border);border-radius:10px;padding:11px 14px;cursor:pointer;margin-bottom:7px;}
.badge-plate{display:inline-block;background:#1a2a1a;border:1px solid #4caf5066;border-radius:4px;padding:1px 6px;font-size:11px;color:#4caf50;font-weight:700;letter-spacing:2px;}
.badge-visit{display:inline-block;background:#1a3040;border:1px solid #5ab4d666;border-radius:4px;padding:1px 7px;font-size:11px;color:#5ab4d6;font-weight:700;}
.av{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0;}
.suggest-box{position:absolute;top:100%;left:0;right:0;background:var(--bg5);border:1px solid var(--border3);border-radius:6px;z-index:50;max-height:140px;overflow-y:auto;}
.suggest-item{padding:7px 11px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--sep);}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:36px;height:36px;border-radius:50%;border:3px solid #E84545;border-top-color:transparent;animation:spin 1s linear infinite;}
</style>
</head>

const COLORS=["#E84545","#2B7A77","#F5A623","#7B2FBE","#1E88E5","#43A047","#E91E63","#FF7043"];
const TODAY=new Date();
function pad2(n){return String(n).padStart(2,"0");}
function toKey(d){return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate());}
function addDays(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r;}
function sameDay(a,b){return toKey(a)===toKey(b);}
function jpDay(d){return["日","月","火","水","木","金","土"][d.getDay()];}
function t2m(t){var p=t.split(":");return Number(p[0])*60+Number(p[1]);}
function m2t(m){return pad2(Math.floor(m/60))+":"+pad2(m%60);}

function arr2obj(arr){var o={};arr.forEach(function(x){o["id_"+x.id]=x;});return o;}
function obj2arr(obj){if(!obj)return[];return Object.values(obj);}
function shiftsToFb(sh){var out={};Object.keys(sh).forEach(function(date){out[date]={};Object.keys(sh[date]).forEach(function(sid){out[date][sid]=sh[date][sid]===null?"__OFF__":sh[date][sid];});});return out;}

var fbTimer={};
function fbWrite(path,data){clearTimeout(fbTimer[path]);S.syncStatus="syncing";updateSyncUI();fbTimer[path]=setTimeout(function(){set(ref(db,path),data).then(function(){S.syncStatus="ok";updateSyncUI();}).catch(function(){S.syncStatus="error";updateSyncUI();});},500);}

function updateSyncUI(){var e=document.getElementById("sync-indicator");if(!e)return;var c={syncing:{color:"#ffa726",text:"同期中…"},ok:{color:"#4caf50",text:"✓"},error:{color:"#E84545",text:"⚠"}};var x=c[S.syncStatus]||c.ok;e.style.color=x.color;e.textContent=x.text;}

function startListeners(){
  onValue(ref(db,"staff"),function(snap){var d=snap.val();if(d){S.staff=obj2arr(d);render();}});
  onValue(ref(db,"svcs"),function(snap){var d=snap.val();if(d){S.svcs=obj2arr(d);render();}});
  onValue(ref(db,"customers"),function(snap){var d=snap.val();if(d){S.customers=obj2arr(d);}render();});
  onValue(ref(db,"reservations"),function(snap){var d=snap.val();S.res=d?obj2arr(d):[];render();});
  onValue(ref(db,"shifts"),function(snap){S.shifts=fbToShifts(snap.val());render();});

async function init(){
  try{
    var snap=await get(ref(db,"staff"));
    if(!snap.exists()){await set(ref(db,"staff"),arr2obj(DEF_STAFF));await set(ref(db,"svcs"),arr2obj(DEF_SVC));await set(ref(db,"customers"),arr2obj(DEF_CUST));await set(ref(db,"reservations"),arr2obj(makeDefRes()));await set(ref(db,"shifts"),shiftsToFb(makeDefShifts()));}

}
