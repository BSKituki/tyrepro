<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#111111">
<title>TYRE PRO</title>
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;background:#0d0d0d;color:#f0ede6;font-family:'Noto Sans JP','Helvetica Neue',sans-serif;overscroll-behavior:none;}
input,select,button{font-family:inherit;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:#111;}
::-webkit-scrollbar-thumb{background:#333;border-radius:2px;}
#app{min-height:100vh;}
.topbar{background:#111;border-bottom:1px solid #1e1e1e;padding:0 14px;display:flex;align-items:center;gap:8px;height:52px;position:sticky;top:0;z-index:100;}
.nav{background:#111;border-bottom:1px solid #1a1a1a;display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.nav::-webkit-scrollbar{display:none;}
.nav button{background:none;border:none;color:#484848;font-size:12px;padding:10px 12px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;font-family:inherit;}
.nav button.active{color:#E84545;border-bottom-color:#E84545;font-weight:700;}
.datestrip{padding:9px 14px;display:flex;gap:5px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.datestrip::-webkit-scrollbar{display:none;}
.content{padding:0 14px 80px;}
.overlay-bg{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:200;padding:12px;}
.overlay-box{background:#1c1c1c;border:1px solid #2e2e2e;border-radius:12px;padding:22px;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;}
.stitle{font-weight:800;font-size:15px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #222;}
.fl{font-size:12px;color:#666;display:block;margin-bottom:4px;}
.tinput{width:100%;background:#111;border:1px solid #333;border-radius:6px;padding:8px 12px;color:#f0ede6;font-size:14px;outline:none;font-family:inherit;}
.tsel{width:100%;background:#111;border:1px solid #333;border-radius:6px;padding:8px 12px;color:#f0ede6;font-size:14px;font-family:inherit;}
.pbtn{padding:8px 16px;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600;border:none;font-family:inherit;}
.card{background:#161616;border:1px solid #202020;border-radius:10px;padding:11px 14px;cursor:pointer;margin-bottom:7px;}
.badge-plate{display:inline-block;background:#1a2a1a;border:1px solid #4caf5066;border-radius:4px;padding:1px 6px;font-size:11px;color:#4caf50;font-weight:700;letter-spacing:2px;}
.badge-visit{display:inline-block;background:#1a3040;border:1px solid #5ab4d666;border-radius:4px;padding:1px 7px;font-size:11px;color:#5ab4d6;font-weight:700;}
.av{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0;}
.suggest-box{position:absolute;top:100%;left:0;right:0;background:#1e1e1e;border:1px solid #333;border-radius:6px;z-index:50;max-height:140px;overflow-y:auto;}
.suggest-item{padding:7px 11px;cursor:pointer;font-size:13px;border-bottom:1px solid #252525;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:36px;height:36px;border-radius:50%;border:3px solid #E84545;border-top-color:transparent;animation:spin 1s linear infinite;}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ── ヘルパー ──
var COLORS=["#E84545","#2B7A77","#F5A623","#7B2FBE","#1E88E5","#43A047","#E91E63","#FF7043"];
var TODAY=new Date();
function pad2(n){return String(n).padStart(2,"0");}
function toKey(d){return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate());}
function addDays(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r;}
function sameDay(a,b){return toKey(a)===toKey(b);}
function jpDay(d){return["日","月","火","水","木","金","土"][d.getDay()];}
function t2m(t){var p=t.split(":");return Number(p[0])*60+Number(p[1]);}
function m2t(m){return pad2(Math.floor(m/60))+":"+pad2(m%60);}
function fmtDate(key){var d=new Date(key);return(d.getMonth()+1)+"月"+d.getDate()+"日("+jpDay(d)+")";}
function mapsUrl(a){return"https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(a);}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

var DAYS=[],SLOTS=[];
for(var _i=0;_i<60;_i++)DAYS.push(addDays(TODAY,_i));
for(var _m=9*60;_m<=18*60;_m+=30)SLOTS.push(m2t(_m));

// ── ストレージ(localStorage) ──
var SK={staff:"tp-staff",svc:"tp-svc",cust:"tp-cust",res:"tp-res",shift:"tp-shift"};
function load(k,def){try{var v=localStorage.getItem(k);return v?JSON.parse(v):def;}catch(e){return def;}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

// ── 初期データ ──
var DEF_STAFF=[
  {id:1,name:"田中 健",color:COLORS[0],avatar:"田",active:true},
  {id:2,name:"佐藤 誠",color:COLORS[1],avatar:"佐",active:true},
  {id:3,name:"山本 亮",color:COLORS[2],avatar:"山",active:true},
  {id:4,name:"鈴木 学",color:COLORS[3],avatar:"鈴",active:true}
];
var DEF_SVC=[
  {id:1,name:"タイヤ交換（4本）",dur:60,active:true},
  {id:2,name:"タイヤ交換（2本）",dur:45,active:true},
  {id:3,name:"タイヤローテーション",dur:30,active:true},
  {id:4,name:"バランス調整",dur:30,active:true},
  {id:5,name:"パンク修理",dur:30,active:true}
];
var DEF_CUST=[
  {id:1001,lastName:"鈴木",firstName:"一郎",cars:[{make:"トヨタ プリウス",plate4:"1234"}],phone:"090-1234-5678",memo:""},
  {id:1002,lastName:"山田",firstName:"花子",cars:[{make:"ホンダ フィット",plate4:"5678"}],phone:"",memo:""},
  {id:1003,lastName:"中村",firstName:"次郎",cars:[{make:"日産 リーフ",plate4:"9012"}],phone:"080-9999-0000",memo:""}
];
var DEF_RES=[
  {id:101,custId:1001,carIdx:0,sid:1,date:toKey(TODAY),time:"09:00",dur:60,stfIds:[1],status:"confirmed",memo:"",visit:false,address:""},
  {id:102,custId:1002,carIdx:0,sid:3,date:toKey(TODAY),time:"10:30",dur:30,stfIds:[2],status:"confirmed",memo:"",visit:false,address:""},
  {id:103,custId:1003,carIdx:0,sid:4,date:toKey(TODAY),time:"11:00",dur:30,stfIds:[3,4],status:"pending",memo:"2名対応",visit:false,address:""},
  {id:104,custId:1001,carIdx:0,sid:2,date:toKey(addDays(TODAY,1)),time:"14:00",dur:45,stfIds:[1,2],status:"confirmed",memo:"",visit:true,address:"東京都新宿区西新宿1-1-1"}
];
function makeDefShifts(){
  var s={};
  DAYS.forEach(function(d){
    var key=toKey(d);s[key]={};
    DEF_STAFF.forEach(function(st){
      var we=d.getDay()===0||d.getDay()===6;
      s[key][st.id]=(we&&st.id%2===0)?null:{start:"09:00",end:"18:00"};
    });
  });
  return s;
}

// ── アプリ状態 ──
var S={
  view:"timeline",
  selDate:toKey(TODAY),
  role:"manager",
  staff:load(SK.staff,DEF_STAFF),
  svcs:load(SK.svc,DEF_SVC),
  res:load(SK.res,DEF_RES),
  customers:load(SK.cust,DEF_CUST),
  shifts:load(SK.shift,makeDefShifts()),
  moff:0,
  modal:null,  // null | "res_new" | "res_edit" | "cust_new" | "cust_edit" | "cust_detail" | "shift" | "staff_mgr" | "svc_mgr"
  modalData:null,
  rf:{custId:null,lastName:"",firstName:"",carIdx:0,newCarMake:"",newCarPlate4:"",sid:1,date:toKey(TODAY),time:"09:00",dur:60,stfIds:[1],status:"confirmed",memo:"",visit:false,address:""},
  cf:{lastName:"",firstName:"",carMake:"",carPlate4:"",phone:"",memo:""},
  sfForm:{name:"",color:COLORS[0]},
  svForm:{name:"",dur:30},
  custSearch:"",
  shiftCell:null
};

function getStaff(id){return S.staff.find(function(s){return s.id===id;});}
function getSvc(id){return S.svcs.find(function(s){return s.id===id;});}
function getCust(id){return S.customers.find(function(c){return c.id===id;});}
function activeStaff(){return S.staff.filter(function(s){return s.active;});}
function activeSvcs(){return S.svcs.filter(function(s){return s.active;});}
function todayRes(){return S.res.filter(function(r){return r.date===S.selDate;});}
function custHistory(cid){return S.res.filter(function(r){return r.custId===cid;}).slice().sort(function(a,b){return b.date.localeCompare(a.date);});}
function monthDays(){
  var b=new Date(TODAY.getFullYear(),TODAY.getMonth()+S.moff,1);
  var y=b.getFullYear(),mo=b.getMonth(),len=new Date(y,mo+1,0).getDate(),arr=[];
  for(var i=0;i<len;i++)arr.push(new Date(y,mo,i+1));
  return arr;
}

// ── 状態変更＋再描画 ──
function setState(fn){fn(S);render();}
function saveAll(){save(SK.staff,S.staff);save(SK.svc,S.svcs);save(SK.res,S.res);save(SK.cust,S.customers);save(SK.shift,S.shifts);}

// ── DOM生成ヘルパー ──
function el(tag,props,children){
  var e=document.createElement(tag);
  if(props)Object.keys(props).forEach(function(k){
    if(k==="style"&&typeof props[k]==="object"){Object.assign(e.style,props[k]);}
    else if(k.startsWith("on")){e.addEventListener(k.slice(2).toLowerCase(),props[k]);}
    else if(k==="className"){e.className=props[k];}
    else{e.setAttribute(k,props[k]);}
  });
  if(children){
    (Array.isArray(children)?children:[children]).forEach(function(c){
      if(c==null||c===false)return;
      e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c);
    });
  }
  return e;
}
function txt(t){return document.createTextNode(t||"");}
function div(style,children){return el("div",{style:style},children);}
function span(style,children){return el("span",{style:style},children);}
function btn(label,style,onClick){var b=el("button",{style:style,onClick:onClick});b.textContent=label;return b;}

function avEl(s,sz){
  sz=sz||28;
  var d=el("div",{className:"av"});
  d.style.width=sz+"px";d.style.height=sz+"px";d.style.background=s.color;d.style.fontSize=(sz*.4)+"px";
  d.textContent=s.avatar;
  return d;
}
function plateBadge(p){if(!p)return null;var s=el("span",{className:"badge-plate"});s.textContent=p;return s;}
function visitBadge(){var s=el("span",{className:"badge-visit"});s.textContent="🚗 出張";return s;}

function pBtn(label,vari,onClick,extraStyle){
  var styles={
    primary:{background:"#E84545",color:"#fff"},
    ghost:{background:"transparent",color:"#888",border:"1px solid #333"},
    danger:{background:"transparent",color:"#E84545",border:"1px solid #E84545"}
  };
  var b=el("button",{className:"pbtn",onClick:onClick,style:Object.assign({},styles[vari]||styles.ghost,extraStyle||{})});
  b.textContent=label;
  return b;
}

function tInput(value,onInput,placeholder,extraStyle){
  var i=el("input",{className:"tinput",placeholder:placeholder||""});
  i.value=value;
  i.addEventListener("input",function(e){onInput(e.target.value);});
  if(extraStyle)Object.assign(i.style,extraStyle);
  return i;
}
function tSel(value,onChange,options){
  var s=el("select",{className:"tsel"});
  options.forEach(function(o){
    var op=document.createElement("option");
    op.value=o.value;op.textContent=o.label;
    if(String(o.value)===String(value))op.selected=true;
    s.appendChild(op);
  });
  s.addEventListener("change",function(e){onChange(e.target.value);});
  return s;
}

function labelWrap(labelText,content){
  var w=div({});
  var l=el("label",{className:"fl"});l.textContent=labelText;
  w.appendChild(l);w.appendChild(content);
  return w;
}

// ── モーダル ──
function openOverlay(contentFn){
  var bg=div({position:"fixed",inset:0,background:"rgba(0,0,0,.88)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:"12px"});
  var box=div({background:"#1c1c1c",border:"1px solid #2e2e2e",borderRadius:"12px",padding:"22px",width:"100%",maxWidth:"540px",maxHeight:"92vh",overflowY:"auto"});
  bg.addEventListener("click",function(){bg.remove();});
  box.addEventListener("click",function(e){e.stopPropagation();});
  contentFn(box,function(){bg.remove();});
  bg.appendChild(box);
  document.getElementById("app").appendChild(bg);
}
function stitle(box,t){var d=div({fontWeight:800,fontSize:"15px",marginBottom:"14px",paddingBottom:"10px",borderBottom:"1px solid #222"});d.textContent=t;box.appendChild(d);}

// ── 予約モーダル ──
function openResModal(initRf,isNew){
  var rf=Object.assign({},initRf);
  openOverlay(function(box,close){
    function rebuild(){box.innerHTML="";buildResModal(box,close,rf,isNew,function(newRf){rf=newRf;rebuild();});}
    rebuild();
  });
}
function buildResModal(box,close,rf,isNew,onRfChange){
  stitle(box,isNew?"新規予約":"予約を編集");
  var form=div({display:"flex",flexDirection:"column",gap:"11px"});

  // 出張トグル
  var visitBtn=el("button",{className:"pbtn",onClick:function(){onRfChange(Object.assign({},rf,{visit:!rf.visit}));}});
  Object.assign(visitBtn.style,rf.visit?{background:"#1a3040",color:"#5ab4d6",border:"1px solid #5ab4d666"}:{background:"#1a1a1a",color:"#555",border:"1px solid #2a2a2a"});
  visitBtn.textContent=rf.visit?"🚗 出張対応":"🏪 店舗対応";
  form.appendChild(visitBtn);

  // 住所
  if(rf.visit){
    var addrW=div({});
    var addrL=el("label",{className:"fl"});addrL.textContent="訪問先住所";addrW.appendChild(addrL);
    var addrI=tInput(rf.address,function(v){rf.address=v;if(mapLink){mapLink.href=mapsUrl(v);}},  "例：東京都新宿区西新宿1-1-1");
    addrW.appendChild(addrI);
    var mapLink=null;
    if(rf.address){
      mapLink=el("a",{href:mapsUrl(rf.address),target:"_blank",rel:"noopener noreferrer"});
      Object.assign(mapLink.style,{display:"inline-block",marginTop:"5px",fontSize:"11px",color:"#5ab4d6",textDecoration:"none",background:"#1a3040",border:"1px solid #5ab4d644",borderRadius:"8px",padding:"3px 10px"});
      mapLink.textContent="🗺 地図で確認";
      addrW.appendChild(mapLink);
    }
    form.appendChild(addrW);
  }

  // 顧客検索
  var custW=div({position:"relative"});
  var grid2=div({display:"grid",gridTemplateColumns:"1fr 1fr",gap:"7px"});
  var lnW=div({position:"relative"});
  var lnI=tInput(rf.lastName,function(v){
    rf.lastName=v;rf.custId=null;rf.firstName="";rf.carIdx=0;
    sugBox.innerHTML="";
    var suggs=S.customers.filter(function(c){return v&&c.lastName.startsWith(v);});
    if(suggs.length>0){
      suggs.forEach(function(c){
        var it=div({padding:"7px 11px",cursor:"pointer",fontSize:"13px",borderBottom:"1px solid #252525"});
        it.textContent=c.lastName+" "+c.firstName+(c.cars[0]&&c.cars[0].plate4?" ["+c.cars[0].plate4+"]":"");
        it.addEventListener("click",function(){
          rf.custId=c.id;rf.lastName=c.lastName;rf.firstName=c.firstName;rf.carIdx=0;
          lnI.value=c.lastName;fnI.value=c.firstName;
          sugBox.innerHTML="";statusDiv.textContent="✓ 既存顧客";statusDiv.style.color="#4caf50";
        });
        sugBox.appendChild(it);
      });
    }
  },"名字");
  var sugBox=div({position:"absolute",top:"100%",left:0,right:0,background:"#1e1e1e",border:"1px solid #333",borderRadius:"6px",zIndex:50,maxHeight:"140px",overflowY:"auto"});
  lnW.appendChild(lnI);lnW.appendChild(sugBox);
  var fnI=tInput(rf.firstName,function(v){rf.firstName=v;},"名前");
  grid2.appendChild(lnW);grid2.appendChild(fnI);
  var custLabel=el("label",{className:"fl"});custLabel.textContent="お客様（名字で検索）";
  custW.appendChild(custLabel);custW.appendChild(grid2);
  var statusDiv=div({fontSize:"11px",marginTop:"3px"});
  if(rf.custId){statusDiv.textContent="✓ 既存顧客";statusDiv.style.color="#4caf50";}
  else if(rf.lastName){statusDiv.textContent="新規顧客として登録";statusDiv.style.color="#ffa726";}
  custW.appendChild(statusDiv);
  form.appendChild(custW);

  // 車両
  var c=rf.custId?getCust(rf.custId):null;
  if(c&&c.cars.length>0){
    form.appendChild(labelWrap("車両",tSel(rf.carIdx,function(v){rf.carIdx=Number(v);},c.cars.map(function(car,i){return{value:i,label:car.make+(car.plate4?" ["+car.plate4+"]":"")}; }))));
  } else if(!rf.custId){
    var carg=div({display:"grid",gridTemplateColumns:"1fr 88px",gap:"7px"});
    carg.appendChild(labelWrap("車種",tInput(rf.newCarMake,function(v){rf.newCarMake=v;},"例：トヨタ プリウス")));
    var p4i=tInput(rf.newCarPlate4,function(v){rf.newCarPlate4=v.replace(/\D/g,"").slice(0,4);},"1234");
    Object.assign(p4i.style,{textAlign:"center",letterSpacing:"3px",fontWeight:"700"});
    p4i.maxLength=4;
    carg.appendChild(labelWrap("車番号4桁",p4i));
    form.appendChild(carg);
  }

  // 作業
  form.appendChild(labelWrap("作業内容",tSel(rf.sid,function(v){var sv=getSvc(Number(v));rf.sid=Number(v);if(sv)rf.dur=sv.dur;},activeSvcs().map(function(s){return{value:s.id,label:s.name+"（"+s.dur+"分）"}; }))));

  // 日付・時間
  var dtg=div({display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"});
  dtg.appendChild(labelWrap("日付",tSel(rf.date,function(v){rf.date=v;},DAYS.map(function(d){var k=toKey(d);return{value:k,label:(d.getMonth()+1)+"/"+d.getDate()+"("+jpDay(d)+")"}; }))));
  dtg.appendChild(labelWrap("時間",tSel(rf.time,function(v){rf.time=v;},SLOTS.map(function(t){return{value:t,label:t}; }))));
  form.appendChild(dtg);

  // 担当スタッフ
  var stfW=div({});
  var stfL=el("label",{className:"fl"});stfL.textContent="担当スタッフ（複数可）";stfW.appendChild(stfL);
  var stfGrid=div({display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:"6px"});
  activeStaff().forEach(function(s){
    var sel=rf.stfIds.indexOf(s.id)!==-1;
    var sb=el("button",{className:"pbtn",onClick:function(){
      var ids=rf.stfIds.slice();var idx=ids.indexOf(s.id);
      if(idx===-1)ids.push(s.id);else if(ids.length>1)ids.splice(idx,1);
      rf.stfIds=ids;
      Object.assign(sb.style,sel2style(!sel));
      chk.textContent=rf.stfIds.indexOf(s.id)!==-1?"✓":"";
    }});
    function sel2style(isSel){return isSel?{border:"1px solid "+s.color,background:s.color+"22",color:s.color}:{border:"1px solid #2a2a2a",background:"transparent",color:"#666"};}
    Object.assign(sb.style,sel2style(sel));
    sb.style.display="flex";sb.style.alignItems="center";sb.style.gap="6px";sb.style.fontSize="12px";
    sb.appendChild(avEl(s,18));
    sb.appendChild(document.createTextNode(s.name));
    var chk=span({marginLeft:"auto",fontSize:"11px"});chk.textContent=sel?"✓":"";
    sb.appendChild(chk);
    stfGrid.appendChild(sb);
  });
  stfW.appendChild(stfGrid);
  form.appendChild(stfW);

  // ステータス
  var stW=div({});var stL=el("label",{className:"fl"});stL.textContent="ステータス";stW.appendChild(stL);
  var stRow=div({display:"flex",gap:"7px"});
  [["confirmed","確定"],["pending","仮予約"]].forEach(function(p){
    var b=el("button",{className:"pbtn",onClick:function(){
      rf.status=p[0];
      stRow.querySelectorAll("button").forEach(function(x){Object.assign(x.style,{border:"1px solid #2a2a2a",background:"transparent",color:"#555"});});
      Object.assign(b.style,{border:"1px solid #E84545",background:"#E8454522",color:"#E84545"});
    }});
    b.textContent=p[1];b.style.flex="1";
    if(rf.status===p[0])Object.assign(b.style,{border:"1px solid #E84545",background:"#E8454522",color:"#E84545"});
    else Object.assign(b.style,{border:"1px solid #2a2a2a",background:"transparent",color:"#555"});
    stRow.appendChild(b);
  });
  stW.appendChild(stRow);form.appendChild(stW);

  // メモ
  form.appendChild(labelWrap("メモ",tInput(rf.memo,function(v){rf.memo=v;},"備考など")));
  box.appendChild(form);

  // ボタン
  var btnRow=div({display:"flex",gap:"7px",marginTop:"16px"});

      SLOTS.forEach(function(t){col.appendChild(div({height:"48px",borderBottom:"1px solid #141414"}));});
      if(shift){
        var top=(t2m(shift.start)-9*60)/30*48,h=(t2m(shift.end)-9*60)/30*48-top;
        var shd=div({position:"absolute",left:0,right:0,background:"rgba(255,255,255,0.018)",borderLeft:"3px solid "+s.color+"44"});
        shd.style.top=top+"px";shd.style.height=h+"px";col.appendChild(shd);
      }else{
        var off=div({position:"absolute",inset:0,background:"repeating-linear-gradient(45deg,transparent,transparent 6px,rgba(255,255,255,0.01) 6px,rgba(255,255,255,0.01) 12px)",pointerEvents:"none"});
        var offT=div({textAlign:"center",paddingTop:"60px",fontSize:"10px",color:"#2a2a2a"});offT.textContent="休";off.appendChild(offT);col.appendChild(off);
      }
      sRes.forEach(function(r){
        var rtop=(t2m(r.time)-9*60)/30*48,rh=(r.dur/30)*48-4;
        var rb=div({position:"absolute",left:"4px",right:"4px",background:r.visit?"#1a3a4a":s.color,borderRadius:"6px",padding:"3px 6px",cursor:"pointer",overflow:"hidden"});
        rb.style.top=(rtop+2)+"px";rb.style.height=rh+"px";
        rb.style.opacity=r.status==="pending"?"0.72":"1";
        rb.style.border=r.visit?"2px solid #5ab4d6":r.status==="pending"?"1px dashed rgba(255,255,255,.3)":"none";
        var c=getCust(r.custId),car=c&&c.cars[r.carIdx||0],svc=getSvc(r.sid);
        var rn=div({fontSize:"10px",fontWeight:"700",color:"#fff",lineHeight:"1.3"});
        rn.textContent=(r.visit?"🚗 ":"")+(c?c.lastName+c.firstName:"—");rb.appendChild(rn);
        var rs=div({fontSize:"9px",color:"rgba(255,255,255,.8)"});rs.textContent=r.time+"・"+(svc?svc.name:"—");rb.appendChild(rs);
        if(car&&car.plate4){var rp=div({fontSize:"9px",color:"rgba(255,255,255,.65)"});rp.textContent="["+car.plate4+"]";rb.appendChild(rp);}
        rb.addEventListener("click",function(){
          var initRf=Object.assign({},r,{_id:r.id,lastName:c?c.lastName:"",firstName:c?c.firstName:""});
          openResModal(initRf,false);
        });
        col.appendChild(rb);
      });
      grid.appendChild(col);
    });
    tl.appendChild(grid);content.appendChild(tl);
  }

  // ════ LIST ════
  if(S.view==="list"){
    var tr2=todayRes();
    var tc=div({marginBottom:"8px",fontSize:"12px",color:"#444"});tc.textContent=tr2.length+"件";content.appendChild(tc);
    if(tr2.length===0){var em=div({padding:"40px",textAlign:"center",color:"#2a2a2a",border:"1px solid #1a1a1a",borderRadius:"10px"});em.textContent="予約なし";content.appendChild(em);}
    tr2.slice().sort(function(a,b){return a.time.localeCompare(b.time);}).forEach(function(r){
      var c=getCust(r.custId),car=c&&c.cars[r.carIdx||0],svc=getSvc(r.sid);
      var card=div({background:"#161616",borderRadius:"10px",padding:"11px 14px",cursor:"pointer",marginBottom:"7px",
        borderLeft:r.visit?"3px solid #5ab4d6":"3px solid transparent",
        border:r.visit?"1px solid #5ab4d644":"1px solid #202020"});
      var top=div({display:"flex",alignItems:"flex-start",gap:"9px"});
      var tm=div({fontSize:"17px",fontWeight:"800",color:r.visit?"#5ab4d6":"#E84545",minWidth:"50px"});tm.textContent=r.time;top.appendChild(tm);
      var info=div({flex:"1"});
      var nh=div({display:"flex",alignItems:"center",gap:"5px",flexWrap:"wrap"});
      var nm2=span({fontWeight:"700",fontSize:"14px"});nm2.textContent=c?c.lastName+" "+c.firstName:"—";nh.appendChild(nm2);
      if(car&&car.plate4)nh.appendChild(plateBadge(car.plate4));
      if(r.visit)nh.appendChild(visitBadge());
      var stBadge=span({fontSize:"10px",padding:"2px 6px",borderRadius:"10px",fontWeight:"700",background:r.status==="confirmed"?"#4caf5022":"#ffa72622",color:r.status==="confirmed"?"#4caf50":"#ffa726"});stBadge.textContent=r.status==="confirmed"?"確定":"仮予約";nh.appendChild(stBadge);
      info.appendChild(nh);
      var sub2=div({fontSize:"12px",color:"#666",marginTop:"2px"});sub2.textContent=(car?car.make:"—")+" / "+(svc?svc.name:"—")+"（"+r.dur+"分）";info.appendChild(sub2);
      if(r.visit&&r.address){var ad2=div({fontSize:"11px",color:"#5ab4d6",marginTop:"3px"});ad2.textContent="📍 "+r.address;info.appendChild(ad2);}
      top.appendChild(info);card.appendChild(top);
      var stfRow2=div({display:"flex",gap:"5px",marginTop:"6px",flexWrap:"wrap"});
      (r.stfIds||[]).forEach(function(sid){var s=getStaff(sid);if(!s)return;
        var sb=div({display:"flex",alignItems:"center",gap:"4px",background:s.color+"18",border:"1px solid "+s.color+"44",borderRadius:"12px",padding:"2px 7px 2px 3px"});
        sb.appendChild(avEl(s,14));var sn=span({fontSize:"10px",color:s.color,fontWeight:"600"});sn.textContent=s.name.split(" ")[0];sb.appendChild(sn);stfRow2.appendChild(sb);
      });
      if(r.visit&&r.address){
        var mapA=el("a",{href:mapsUrl(r.address),target:"_blank",rel:"noopener noreferrer"});
        Object.assign(mapA.style,{fontSize:"10px",color:"#5ab4d6",background:"#1a3040",border:"1px solid #5ab4d644",borderRadius:"10px",padding:"2px 8px",textDecoration:"none"});
        mapA.textContent="🗺 地図";mapA.addEventListener("click",function(e){e.stopPropagation();});stfRow2.appendChild(mapA);
      }
      card.appendChild(stfRow2);
      card.addEventListener("click",function(){
        var initRf=Object.assign({},r,{_id:r.id,lastName:c?c.lastName:"",firstName:c?c.firstName:""});
        openResModal(initRf,false);
      });
      content.appendChild(card);
    });
  }

  // ════ 出張一覧 ════
  if(S.view==="visit"){
    var vr=S.res.filter(function(r){return r.visit;}).slice().sort(function(a,b){return a.date===b.date?a.time.localeCompare(b.time):a.date.localeCompare(b.date);});
    var vt=div({marginBottom:"10px",fontSize:"12px",color:"#5ab4d6"});vt.textContent="🚗 出張予約 "+vr.length+"件";content.appendChild(vt);
    if(vr.length===0){var vem=div({padding:"40px",textAlign:"center",color:"#2a2a2a",border:"1px solid #1a1a1a",borderRadius:"10px"});vem.textContent="出張予約なし";content.appendChild(vem);}
    vr.forEach(function(r){
      var isPast=r.date<toKey(TODAY),c=getCust(r.custId),car=c&&c.cars[r.carIdx||0],svc=getSvc(r.sid);
      var card=div({background:"#161620",border:"1px solid #5ab4d644",borderRadius:"10px",padding:"12px 14px",cursor:"pointer",marginBottom:"8px",opacity:isPast?"0.6":"1"});
      var drow=div({display:"flex",alignItems:"center",gap:"8px",marginBottom:"5px"});
      var dt2=span({fontSize:"12px",fontWeight:"700",color:isPast?"#555":"#5ab4d6"});dt2.textContent=fmtDate(r.date)+" "+r.time;drow.appendChild(dt2);
      var stB=span({fontSize:"10px",padding:"1px 6px",borderRadius:"8px",fontWeight:"700",background:r.status==="confirmed"?"#4caf5022":"#ffa72622",color:r.status==="confirmed"?"#4caf50":"#ffa726"});stB.textContent=r.status==="confirmed"?"確定":"仮予約";drow.appendChild(stB);
      card.appendChild(drow);
      var nh2=div({display:"flex",alignItems:"center",gap:"6px",flexWrap:"wrap"});
      var nm3=span({fontWeight:"700",fontSize:"14px"});nm3.textContent=c?c.lastName+" "+c.firstName:"—";nh2.appendChild(nm3);
      if(car&&car.plate4)nh2.appendChild(plateBadge(car.plate4));
      card.appendChild(nh2);
      var sub3=div({fontSize:"12px",color:"#666",marginTop:"2px"});sub3.textContent=(car?car.make:"—")+" / "+(svc?svc.name:"—")+"（"+r.dur+"分）";card.appendChild(sub3);
      if(r.address){
        var adrow=div({marginTop:"6px",display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"});
        var adt=span({fontSize:"12px",color:"#5ab4d6"});adt.textContent="📍 "+r.address;adrow.appendChild(adt);
        var mapA2=el("a",{href:mapsUrl(r.address),target:"_blank",rel:"noopener noreferrer"});
        Object.assign(mapA2.style,{fontSize:"11px",color:"#5ab4d6",background:"#1a3040",border:"1px solid #5ab4d644",borderRadius:"10px",padding:"2px 9px",textDecoration:"none"});
        mapA2.textContent="🗺 地図";mapA2.addEventListener("click",function(e){e.stopPropagation();});adrow.appendChild(mapA2);
        card.appendChild(adrow);
      }
      var stfRow3=div({display:"flex",gap:"5px",marginTop:"6px",flexWrap:"wrap"});
      (r.stfIds||[]).forEach(function(sid){var s=getStaff(sid);if(!s)return;
        var sb=div({display:"flex",alignItems:"center",gap:"3px",background:s.color+"18",border:"1px solid "+s.color+"44",borderRadius:"12px",padding:"2px 7px 2px 3px"});
        sb.appendChild(avEl(s,14));var sn=span({fontSize:"10px",color:s.color,fontWeight:"600"});sn.textContent=s.name.split(" ")[0];sb.appendChild(sn);stfRow3.appendChild(sb);
      });
      card.appendChild(stfRow3);
      card.addEventListener("click",function(){
        var initRf=Object.assign({},r,{_id:r.id,lastName:c?c.lastName:"",firstName:c?c.firstName:""});
        openResModal(initRf,false);
      });
      content.appendChild(card);
    });
  }

  // ════ SHIFT ════
  if(S.view==="shift"){
    var md=monthDays();
    var mnav=div({display:"flex",alignItems:"center",gap:"10px",marginBottom:"12px"});
    var pb2=btn("‹",{background:"none",border:"1px solid #252525",borderRadius:"6px",color:"#777",padding:"4px 10px",cursor:"pointer",fontSize:"15px"},function(){S.moff=Math.max(0,S.moff-1);render();});
    var mlbl=span({fontWeight:"700",fontSize:"14px",minWidth:"88px",textAlign:"center"});
    var bDate=new Date(TODAY.getFullYear(),TODAY.getMonth()+S.moff,1);
    mlbl.textContent=bDate.getFullYear()+"年"+(bDate.getMonth()+1)+"月";
    var nb2=btn("›",{background:"none",border:"1px solid #252525",borderRadius:"6px",color:"#777",padding:"4px 10px",cursor:"pointer",fontSize:"15px"},function(){S.moff=Math.min(1,S.moff+1);render();});
    mnav.appendChild(pb2);mnav.appendChild(mlbl);mnav.appendChild(nb2);content.appendChild(mnav);
    var tw=div({overflowX:"auto"});
    var tbl=document.createElement("table");tbl.style.borderCollapse="collapse";tbl.style.minWidth=(148+md.length*50)+"px";
    var thead=document.createElement("thead"),hrow=document.createElement("tr");
    var th0=document.createElement("th");Object.assign(th0.style,{width:"148px",padding:"7px 10px",textAlign:"left",fontSize:"11px",color:"#444",background:"#111",position:"sticky",left:"0",zIndex:"10",borderBottom:"1px solid #1e1e1e"});th0.textContent="スタッフ";hrow.appendChild(th0);
    md.forEach(function(d){
      var wd=d.getDay(),isT=sameDay(d,TODAY);
      var th=document.createElement("th");Object.assign(th.style,{minWidth:"48px",padding:"3px 1px",textAlign:"center",fontSize:"10px",color:wd===0?"#E84545":wd===6?"#5599ff":"#484848",background:isT?"#1a1010":"#111",borderBottom:"1px solid #1a1a1a",borderLeft:"1px solid #181818"});
      var dn=div({fontWeight:isT?"800":"400"});dn.textContent=d.getDate();th.appendChild(dn);var dw2=div({fontSize:"9px"});dw2.textContent=jpDay(d);th.appendChild(dw2);hrow.appendChild(th);
    });
    thead.appendChild(hrow);tbl.appendChild(thead);
    var tbody=document.createElement("tbody");
    activeStaff().forEach(function(s,si){
      var tr3=document.createElement("tr"),bg=si%2===0?"#111":"#131313";tr3.style.background=bg;
      var td0=document.createElement("td");Object.assign(td0.style,{padding:"6px 10px",position:"sticky",left:"0",background:bg,zIndex:"5",borderBottom:"1px solid #1a1a1a"});
      var stCell=div({display:"flex",alignItems:"center",gap:"6px"});stCell.appendChild(avEl(s,20));
      var sInfo=div({});var sNm=div({fontSize:"12px",fontWeight:"600"});sNm.textContent=s.name;sInfo.appendChild(sNm);
      if(S.role==="manager"){
        var qRow=div({display:"flex",gap:"3px",marginTop:"2px"});
        var allOut=btn("全出",{fontSize:"9px",padding:"1px 4px",borderRadius:"3px",border:"1px solid #2a2a2a",background:"transparent",color:"#4caf50",cursor:"pointer"},function(){
          md.forEach(function(d){var k=toKey(d);if(!S.shifts[k])S.shifts[k]={};S.shifts[k][s.id]={start:"09:00",end:"18:00"};});save(SK.shift,S.shifts);render();
        });
        var allOff=btn("全休",{fontSize:"9px",padding:"1px 4px",borderRadius:"3px",border:"1px solid #2a2a2a",background:"transparent",color:"#E84545",cursor:"pointer"},function(){
          md.forEach(function(d){var k=toKey(d);if(!S.shifts[k])S.shifts[k]={};S.shifts[k][s.id]=null;});save(SK.shift,S.shifts);render();
        });
        qRow.appendChild(allOut);qRow.appendChild(allOff);sInfo.appendChild(qRow);
      }
      stCell.appendChild(sInfo);td0.appendChild(stCell);tr3.appendChild(td0);
      md.forEach(function(d){
        var key=toKey(d),shift=(S.shifts[key]||{})[s.id],isT=sameDay(d,TODAY);
        var td=document.createElement("td");Object.assign(td.style,{textAlign:"center",padding:"2px 1px",borderLeft:"1px solid #181818",borderBottom:"1px solid #181818",cursor:S.role==="manager"?"pointer":"default",background:isT?"rgba(232,69,69,0.04)":"transparent"});
        if(shift){
          var sv=div({fontSize:"9px",color:s.color,fontWeight:"700",lineHeight:"1.4"});
          [shift.start,"〜",shift.end].forEach(function(t){var l=div({color:t==="〜"?"#2a2a2a":s.color});l.textContent=t;sv.appendChild(l);});
          td.appendChild(sv);
        }else{var dash=div({fontSize:"11px",color:"#252525"});dash.textContent="—";td.appendChild(dash);}
        if(S.role==="manager")td.addEventListener("click",function(){openShiftCell(key,s.id);});
        tr3.appendChild(td);
      });
      tbody.appendChild(tr3);
    });
    tbl.appendChild(tbody);tw.appendChild(tbl);content.appendChild(tw);
    var cards=div({display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:"7px",marginTop:"14px"});
    activeStaff().forEach(function(s){
      var wd=md.filter(function(d){return !!(S.shifts[toKey(d)]||{})[s.id];}).length;
      var sc=div({background:"#161616",border:"1px solid "+s.color+"33",borderRadius:"8px",padding:"10px 12px"});
      var sct=div({fontSize:"11px",color:s.color,fontWeight:"700",marginBottom:"2px"});sct.textContent=s.name;sc.appendChild(sct);
      var scn=div({fontSize:"21px",fontWeight:"800"});scn.textContent=wd;sc.appendChild(scn);
      var scs=div({fontSize:"10px",color:"#444"});scs.textContent="出勤予定日";sc.appendChild(scs);
      cards.appendChild(sc);
    });
    content.appendChild(cards);
  }

  // ════ 顧客管理 ════
  if(S.view==="customers"){
    var searchRow=div({display:"flex",gap:"8px",alignItems:"center",marginBottom:"10px"});
    var si=tInput(S.custSearch,function(v){S.custSearch=v;render();},"名前・電話・車種・車番号4桁");
    searchRow.appendChild(si);
    searchRow.appendChild(pBtn("＋登録","primary",function(){openCustEdit(null);},{whiteSpace:"nowrap",padding:"6px 11px",fontSize:"12px"}));
    content.appendChild(searchRow);
    var q=S.custSearch.trim();
    var fc=q?S.customers.filter(function(c){
      var full=c.lastName+c.firstName,plates=c.cars.map(function(x){return x.plate4||"";}).join(""),makes=c.cars.map(function(x){return x.make||"";}).join("");
      return full.includes(q)||c.phone.includes(q)||makes.includes(q)||plates.includes(q);
    }):S.customers;
    var ct=div({marginBottom:"7px",fontSize:"11px",color:"#444"});ct.textContent=fc.length+"件";content.appendChild(ct);
    fc.forEach(function(c){
      var hist2=custHistory(c.id),last2=hist2[0];
      var card=div({background:"#161616",border:"1px solid #202020",borderRadius:"10px",padding:"11px 14px",cursor:"pointer",marginBottom:"7px"});
      var top2=div({display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:"8px"});
      var left=div({flex:"1"});
      var nh3=div({display:"flex",alignItems:"baseline",gap:"6px",flexWrap:"wrap"});
      var nm4=span({fontWeight:"800",fontSize:"15px"});nm4.textContent=c.lastName+" "+c.firstName;nh3.appendChild(nm4);
      if(c.phone){var ph2=span({fontSize:"11px",color:"#555"});ph2.textContent=c.phone;nh3.appendChild(ph2);}
      left.appendChild(nh3);
      c.cars.forEach(function(car){
        var cr=div({display:"flex",alignItems:"center",gap:"5px",marginTop:"2px"});
        var mk=span({fontSize:"12px",color:"#666"});mk.textContent=car.make;cr.appendChild(mk);
        if(car.plate4)cr.appendChild(plateBadge(car.plate4));
        left.appendChild(cr);
      });
      if(c.cars.length===0){var nc2=div({fontSize:"12px",color:"#333",marginTop:"2px"});nc2.textContent="車両未登録";left.appendChild(nc2);}
      if(last2){var lt=div({fontSize:"11px",color:"#3a3a3a",marginTop:"3px"});lt.textContent="最終: "+fmtDate(last2.date);left.appendChild(lt);}
      top2.appendChild(left);
      var right=div({textAlign:"right",flexShrink:"0"});
      var cnt=div({fontSize:"19px",fontWeight:"800",color:"#E84545"});cnt.textContent=hist2.length;right.appendChild(cnt);
      var cntl=div({fontSize:"10px",color:"#444"});cntl.textContent="来店";right.appendChild(cntl);
      top2.appendChild(right);card.appendChild(top2);
      card.addEventListener("click",function(){openCustDetail(c);});
      content.appendChild(card);
    });
    if(fc.length===0){var cem=div({padding:"40px",textAlign:"center",color:"#2a2a2a",border:"1px solid #1a1a1a",borderRadius:"10px"});cem.textContent="見つかりません";content.appendChild(cem);}
  }

  app.appendChild(content);
}

render();

// ── Service Worker ──
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js").catch(function(){});
}
</script>
</body>
